# fly.toml – generated for todo-app backend
# Replace "todo-app-slaiiko" with your actual app name after running: fly launch

app = "todo-app-slaiiko"
primary_region = "cdg"   # Paris — change to your preferred region (cdg=Paris, lhr=London, iad=US-East)

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATA_DIR = "/var/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "todo_data"
  destination = "/var/data"
  initial_size = "1gb"
