services:
  - type: web
    name: todo-app-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: todo-app-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_DISK_MOUNT_PATH
        value: /var/data
